---
name: Release Monthly

# yamllint disable-line rule:truthy
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: ivuorinen/actions/release-monthly@7f6a23b59316795c4b3cb3b3b28dd53e53655a33 # v2026.03.11
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

---
name: Release Monthly

# yamllint disable-line rule:truthy
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: ivuorinen/actions/release-monthly@1da3a0e79fcd7da6bed9ee1979f1449ba11f58f9 # v2026.03.14
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

---
name: Stale

# yamllint disable-line rule:truthy
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: ivuorinen/actions/stale@459781a253d1c53960506b124ae3beaa1090e2a3 # v2026.03.22
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

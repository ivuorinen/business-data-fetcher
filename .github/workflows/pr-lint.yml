---
name: PR Lint

on:
  pull_request:
    branches: [master, main]

jobs:
  lint:
    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ivuorinen/actions/pr-lint@4b58f07a1440225619a22978b03bda64c6889886 # v2026.07.03
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

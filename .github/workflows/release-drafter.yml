---
name: Release Monthly

# yamllint disable-line rule:truthy
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: ivuorinen/actions/release-monthly@dc85cef1c285edd3d2edcb4a7c82bdd08ccc7c56 # v2026.03.20
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

---
name: Stale

# yamllint disable-line rule:truthy
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: ivuorinen/actions/stale@0795e029fb0083fe692fb10b4ed6132822b069e6 # v2026.04.06
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

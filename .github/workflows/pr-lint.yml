---
name: PR Lint

on:
  pull_request:
    branches: [master, main]

jobs:
  lint:
    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ivuorinen/actions/pr-lint@4b58f07a1440225619a22978b03bda64c6889886 # v2026.07.03
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

---
name: PR Lint

on:
  pull_request:
    branches: [master, main]

jobs:
  lint:
    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ivuorinen/actions/pr-lint@39dc3f9c2b914d48f65481b4e085d3e19e1daed9 # v2026.03.31
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

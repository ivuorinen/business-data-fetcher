---
name: Release Monthly

# yamllint disable-line rule:truthy
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: ivuorinen/actions/release-monthly@39dc3f9c2b914d48f65481b4e085d3e19e1daed9 # v2026.03.31
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

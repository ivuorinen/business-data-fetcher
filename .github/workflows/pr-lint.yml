---
name: PR Lint

on:
  pull_request:
    branches: [master, main]

jobs:
  lint:
    permissions:
      contents: read
      issues: write
      pull-requests: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ivuorinen/actions/pr-lint@0795e029fb0083fe692fb10b4ed6132822b069e6 # v2026.04.06
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

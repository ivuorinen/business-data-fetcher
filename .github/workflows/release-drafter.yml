---
name: Release Monthly

# yamllint disable-line rule:truthy
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: ivuorinen/actions/release-monthly@4b58f07a1440225619a22978b03bda64c6889886 # v2026.07.03
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

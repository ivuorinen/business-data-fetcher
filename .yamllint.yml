---
extends: default

rules:
  comments:
    require-starting-space: true
    ignore-shebangs: true
    min-spaces-from-content: 1
  line-length:
    max: 120
    allow-non-breakable-words: true
    allow-non-breakable-inline-mappings: false
  truthy:
    check-keys: false
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1

ignore: |
  vendor/

---
name: Release Monthly

# yamllint disable-line rule:truthy
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: ivuorinen/actions/release-monthly@459781a253d1c53960506b124ae3beaa1090e2a3 # v2026.03.22
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

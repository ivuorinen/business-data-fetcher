---
name: Sync labels

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
    paths:
      - .github/labels.yml
  schedule:
    - cron: "34 5 * * *"
  workflow_call:
  workflow_dispatch:

permissions:
  issues: write

jobs:
  SyncLabels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ivuorinen/actions/sync-labels@4b58f07a1440225619a22978b03bda64c6889886 # v2026.07.03
        with:
          labels: .github/labels.yml
          token: ${{ secrets.GITHUB_TOKEN }}

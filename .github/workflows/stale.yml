---
name: Stale

# yamllint disable-line rule:truthy
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: ivuorinen/actions/stale@39dc3f9c2b914d48f65481b4e085d3e19e1daed9 # v2026.03.31
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
